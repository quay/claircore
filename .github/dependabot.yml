---
# This could be much simpler if Dependabot supported YAML instead of some subset that doesn't include anchors.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      otel:
        # All the otel modules.
        # These basically all move together.
        patterns:
          - "go.opentelemetry.io/*"
      golang-x:
        # All the "stdlib extensions".
        # These basically all move together.
        patterns:
          - "golang.org/x/*"
      dev:
        # All the modules that are only used in tests and tooling.
        patterns:
          - "github.com/google/go-cmp"
          - "github.com/pganalyze/pg_query_go/v6"
          - "github.com/wasilibs/go-pgquery"
          - "go.uber.org/mock"
          - "google.golang.org/protobuf"
  - package-ecosystem: "gomod"
    directory: "/toolkit"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
  - package-ecosystem: "gomod"
    directory: "/updater/driver"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
